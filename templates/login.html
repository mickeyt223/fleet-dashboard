<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTScapes Fleet — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 12px;
            padding: 40px 36px;
            width: 340px;
            text-align: center;
        }
        .login-card h1 {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }
        .login-card h1 span { color: #4ade80; }
        .login-card .subtitle {
            font-size: 13px;
            color: #888;
            margin-bottom: 28px;
        }
        .error-msg {
            background: #ef444422;
            border: 1px solid #ef444444;
            color: #ef4444;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .pin-display {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .pin-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid #2a2d3a;
            background: transparent;
            transition: all 0.15s;
        }
        .pin-dot.filled {
            background: #4ade80;
            border-color: #4ade80;
        }
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 260px;
            margin: 0 auto;
        }
        .key {
            padding: 16px;
            background: #0f1117;
            border: 1px solid #2a2d3a;
            border-radius: 10px;
            color: #fff;
            font-size: 22px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .key:hover { background: #22253a; border-color: #4ade80; }
        .key:active { background: #4ade8030; }
        .key-back {
            font-size: 16px;
            color: #888;
        }
        .key-go {
            background: #4ade80;
            color: #000;
            border-color: #4ade80;
            font-size: 16px;
        }
        .key-go:hover { background: #22c55e; }
        .key-go:disabled { background: #333; color: #666; border-color: #333; cursor: default; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>MT<span>Scapes</span> Fleet</h1>
        <div class="subtitle">Enter your PIN to continue</div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login" id="pinForm">
            <input type="hidden" name="pin" id="pinInput" />

            <div class="pin-display" id="pinDots">
                <div class="pin-dot" id="d0"></div>
                <div class="pin-dot" id="d1"></div>
                <div class="pin-dot" id="d2"></div>
                <div class="pin-dot" id="d3"></div>
                <div class="pin-dot" id="d4"></div>
                <div class="pin-dot" id="d5"></div>
            </div>

            <div class="keypad">
                <button type="button" class="key" onclick="addDigit('1')">1</button>
                <button type="button" class="key" onclick="addDigit('2')">2</button>
                <button type="button" class="key" onclick="addDigit('3')">3</button>
                <button type="button" class="key" onclick="addDigit('4')">4</button>
                <button type="button" class="key" onclick="addDigit('5')">5</button>
                <button type="button" class="key" onclick="addDigit('6')">6</button>
                <button type="button" class="key" onclick="addDigit('7')">7</button>
                <button type="button" class="key" onclick="addDigit('8')">8</button>
                <button type="button" class="key" onclick="addDigit('9')">9</button>
                <button type="button" class="key key-back" onclick="backspace()">&#9003;</button>
                <button type="button" class="key" onclick="addDigit('0')">0</button>
                <button type="button" class="key key-go" id="goBtn" onclick="submitPin()" disabled>GO</button>
            </div>
        </form>
    </div>

<script>
let pin = '';
const MAX_LEN = 6;

function updateDots() {
    for (let i = 0; i < MAX_LEN; i++) {
        document.getElementById('d' + i).classList.toggle('filled', i < pin.length);
    }
    document.getElementById('goBtn').disabled = pin.length < 4;
}

function addDigit(d) {
    if (pin.length >= MAX_LEN) return;
    pin += d;
    updateDots();
}

function backspace() {
    pin = pin.slice(0, -1);
    updateDots();
}

function submitPin() {
    if (pin.length < 4) return;
    document.getElementById('pinInput').value = pin;
    document.getElementById('pinForm').submit();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
    if (e.key >= '0' && e.key <= '9') addDigit(e.key);
    else if (e.key === 'Backspace') backspace();
    else if (e.key === 'Enter' && pin.length >= 4) submitPin();
});
</script>
</body>
</html>
