services:
  - type: web
    name: mtscapes-fleet
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: AZUGA_USERNAME
        sync: false
      - key: AZUGA_PASSWORD
        sync: false
      - key: AZUGA_CLIENT_ID
        sync: false
      - key: AZUGA_AUTH_URL
        sync: false
      - key: FLASK_SECRET_KEY
        sync: false
